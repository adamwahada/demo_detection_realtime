services:
  postgres:
    image: postgres:16
    container_name: tracking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tracking
      POSTGRES_USER:     tracking_user
      POSTGRES_PASSWORD: trck
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking_user -d tracking"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: tracking_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"   # S3 API  — used by Python code
      - "9001:9001"   # Web UI  — open http://server-ip:9001 in browser
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
